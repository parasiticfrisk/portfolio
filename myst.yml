version: 1
project:
  title: August Frisk
  github: parasiticfrisk/portfolio
  authors:
    #  - name: August Frisk
    #    orcid: 0009-0007-9200-8438
    #    linkedin: https://www.linkedin.com/in/august-frisk/
  license:
    - content: CC-BY-SA-4.0
  exclude:
    - _build
    - Thumbs.db
    - '**.ipynb_checkpoints'
    - rss.xml
    - atom.xml
    - README.md
  thebe:
    binder:
      repo: parasiticfrisk/portfolio
      provider: github
      url: https://mybinder.org
      ref: main
  bibliography:
    - docs/pages/references.bib

  toc:
    - file: docs/index.md
    - file: docs/pages/about.md
    - file: docs/pages/experience.md
    - file: docs/pages/research.md
    - file: docs/pages/service.md
