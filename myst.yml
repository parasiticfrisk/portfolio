    # - file: pages/blog.md
    #   children:
    #     - file: posts/
    # - pattern: posts/*.md
    #   hidden: true

extends: docs/abbreviations.yml

site:
  title: August Frisk Portfolio
  options:
    logo: docs/assets/images/logo.png
    logo_dark: docs/assets/images/logo.png
    favicon: docs/assets/images/fav.ico
    folders: false
    hide_title_block: false
    style: docs/assets/css/main.css
    robots: disallow
  actions:
    - title: RSS
      url: https://parasiticfrisk.github.io/portfolio/rss.xml
  template: book-theme
  parts:
    primary_sidebar_footer: ''
