version: 1
project:
  title: August Frisk
   authors:
     - name: August Frisk
     - orcid: 0009-0007-9200-8438
  copyright: '2026'
  exclude:
    - _build
    - Thumbs.db
    - '**.ipynb_checkpoints'
    - rss.xml
    - atom.xml
    - README.md
  github: parasiticfrisk/portfolio
  thebe:
    binder:
      repo: parasiticfrisk/portfolio
      provider: github
      url: https://mybinder.org
      ref: main
  bibliography:
    - docs/pages/references.bib
  toc:
    - file: docs/index.md
    - file: docs/pages/about.md
    - title: Experience
      children:
      - file: docs/pages/experience.md
      - file: docs/pages/service.md
    - title: Works
      children:
      - file: docs/pages/research.md
    #   - file: docs/projects/
    # - file: docs/pages/blog.md
    #   children:
    #     - file: docs/posts/
    # - pattern: posts/*.md
    #   hidden: true
site:
  options:
    logo: docs/assets/images/logo.png
    logo_dark: docs/assets/images/logo.png
    favicon: docs/assets/images/fav.ico
    folders: true
    style: docs/assets/css/main.css
  robots: disallow
  actions:
    - title: RSS
      url: https://parasiticfrisk.github.io/portfolio/rss.xml
  template: book-theme
  parts:
    primary_sidebar_footer: ''
