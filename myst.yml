version: 1
project:
  title: August Frisk
  github: parasiticfrisk/portfolio
  license: CC-BY-SA-4.0
  exclude:
    - _build
    - Thumbs.db
    - '**.ipynb_checkpoints'
    - rss.xml
    - atom.xml
    - README.md
  thebe:
    binder:
      repo: parasiticfrisk/portfolio
      provider: github
      url: https://mybinder.org
      ref: main
  bibliography:
    - docs/pages/references.bib

  toc:
    - file: docs/index.md
    - file: docs/pages/about.md
    - file: docs/pages/experience.md
    - file: docs/pages/research.md
    - file: docs/pages/service.md

    - file: docs/pages/projects.md
      children:
      - pattern: docs/projects/*.md
        sort: descending
        hidden: true

    - file: docs/pages/posts.md
      children:
      - pattern: docs/posts/*.md
        sort: descending
        hidden: true

extends:
  - docs/abbreviations.yml
  - docs/affiliations.yml

site:
  title: August Frisk Portfolio
  options:
    logo: docs/assets/images/logo.png
    logo_dark: docs/assets/images/logo.png
    favicon: docs/assets/images/fav.ico
    folders: false
    hide_title_block: false
    style: docs/assets/css/main.css
    robots: disallow
  actions:
    - title: RSS
      url: https://parasiticfrisk.github.io/portfolio/rss.xml
  template: book-theme
  parts:
    primary_sidebar_footer: ''
